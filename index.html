<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Farmer</title>
<style>
  :root { --grass: #6fb04a; --panel: #fbf7ec; --ink: #4a3b2a; --gold: #f4b53f; --bar: #6cb14a; }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
  html, body { height: 100%; }
  body { font-family: "Segoe UI", system-ui, sans-serif; color: var(--ink); background: var(--grass); display: flex; flex-direction: column; overflow: hidden; border-radius: 12px; }
  #titlebar { -webkit-app-region: drag; height: 34px; display: flex; align-items: center; padding: 0 8px 0 12px; background: rgba(0,0,0,0.12); gap: 8px; }
  #title { font-weight: 700; font-size: 13px; color: #fff; flex: 1; text-shadow: 0 1px 1px rgba(0,0,0,.25); }
  .tbtn { -webkit-app-region: no-drag; width: 22px; height: 22px; border-radius: 6px; border: none; background: rgba(255,255,255,.18); color: #fff; cursor: pointer; font-size: 13px; line-height: 1; display: grid; place-items: center; transition: background .12s; }
  .tbtn:hover { background: rgba(255,255,255,.34); }
  .tbtn.active { background: var(--gold); color: #5a3f12; }
  #close:hover { background: #e5645c; }
  #hud { display: flex; flex-direction: column; gap: 5px; padding: 6px 10px; background: var(--bar); color: #fff; font-size: 11.5px; font-weight: 700; }
  .hud-row { display: flex; align-items: center; gap: 7px; }
  .hud-spacer { flex: 1; min-width: 0; }
  .chip { background: var(--panel); color: var(--ink); border-radius: 999px; padding: 3px 9px; font-weight: 800; display: flex; align-items: center; gap: 4px; box-shadow: 0 2px 0 rgba(0,0,0,.1); white-space: nowrap; }
  .chip svg { display: block; }
  #hint { flex: 1; min-width: 0; text-align: left; text-shadow: 0 1px 1px rgba(0,0,0,.2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip.coins { min-width: 82px; justify-content: flex-end; font-size: 13px; }
  #stage { flex: 1 1 auto; min-height: 0; position: relative; }
  canvas { width: 100%; height: 100%; display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #dock { background: var(--bar); padding: 7px 12px 10px; display: flex; flex-direction: column; gap: 6px; flex: none; }
  .row { display: flex; gap: 7px; }
  .btn { -webkit-app-region: no-drag; flex: 1; background: var(--panel); border: 2px solid transparent; border-radius: 11px; padding: 5px 4px; cursor: pointer; text-align: center; box-shadow: 0 2px 0 rgba(0,0,0,.1); transition: transform .07s, border-color .12s; line-height: 1.12; }
  .btn:hover { transform: translateY(-2px); }
  .btn.sel { border-color: var(--gold); }
  .btn .em { font-size: 17px; height: 20px; display: flex; align-items: center; justify-content: center; }
  .btn .nm { font-size: 10px; font-weight: 800; margin-top: 1px; }
  .btn .sub { font-size: 9.5px; color: #8a7256; }
  #market, #stats { position: absolute; left: 12px; right: 12px; top: 12px; bottom: 12px; display: none; flex-direction: column; gap: 8px; padding: 14px; border-radius: 14px; background: rgba(28,38,30,.94); color: #fff; z-index: 5; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
  .st-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 11px; background: rgba(255,255,255,.07); border-radius: 9px; font-size: 12.5px; font-weight: 600; }
  .st-val { font-weight: 800; }
  .st-div { height: 1px; background: rgba(255,255,255,.14); margin: 2px 0; }
  .mkt-head { display: flex; align-items: center; font-weight: 800; font-size: 15px; }
  .mkt-close { margin-left: auto; cursor: pointer; background: rgba(255,255,255,.16); border-radius: 7px; padding: 2px 9px; }
  .mkt-close:hover { background: #e5645c; }
  .mkt-row { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.09); border-radius: 10px; padding: 9px 11px; font-size: 12.5px; }
  .mkt-crop { width: 96px; font-weight: 700; }
  .mkt-price { width: 92px; font-weight: 700; }
  .mkt-stock { flex: 1; opacity: .8; }
  .mkt-sell, .mkt-up, .mkt-auto { cursor: pointer; border: none; border-radius: 8px; padding: 7px 13px; font-weight: 800; font-size: 12px; background: var(--gold); color: #5a3f12; }
  .mkt-sell:disabled { opacity: .35; cursor: default; }
  .mkt-auto { background: rgba(255,255,255,.16); color: #fff; }
  .mkt-auto.on { background: #43a047; color: #fff; }
  .mkt-silo { margin-top: 6px; font-weight: 700; font-size: 12.5px; }
  .mkt-bar { height: 12px; border-radius: 7px; background: rgba(255,255,255,.16); overflow: hidden; }
  .mkt-bar > div { height: 100%; background: #7cc353; transition: width .2s; }
  .mkt-foot { margin-top: auto; display: flex; gap: 10px; }
  .mkt-foot button { flex: 1; }
  .up { color: #79f079; } .down { color: #ff9090; }
</style>
</head>
<body>
  <div id="titlebar">
    <div id="title">🧑‍🌾 Mini Farmer</div>
    <button class="tbtn active" id="pin" title="Always on top">📌</button>
    <button class="tbtn" id="min" title="Minimize">—</button>
    <button class="tbtn" id="close" title="Close">✕</button>
  </div>

  <div id="hud">
    <div class="hud-row">
      <div class="chip">👷 <span id="workers">0</span></div>
      <div class="chip">🚜 <span id="tractors">0</span></div>
      <div class="chip"><span id="hvIcon"></span> <span id="harvesters">0</span></div>
      <div class="chip">🐄 <span id="animals">0</span></div>
      <div class="chip silo" id="siloChip" title="Open market">🛖 <span id="silo">0/200</span></div>
      <div class="chip" id="statsChip" title="Statistics">📈</div>
      <div class="hud-spacer"></div>
      <div class="chip coins">🪙 <span id="coins">0</span></div>
    </div>
    <div class="hud-row"><div id="hint">Drag to pan · wheel to zoom · click a field to buy</div></div>
  </div>

  <div id="stage"><canvas id="c"></canvas></div>

  <div id="dock">
    <div class="row" id="seeds"></div>
    <div class="row" id="hire"></div>
  </div>

<script>
(() => {
  const wc = window.winControls;
  let pinned = true;
  document.getElementById('pin').onclick = (e) => { pinned = !pinned; e.currentTarget.classList.toggle('active', pinned); wc && wc.setPin(pinned); };
  document.getElementById('min').onclick = () => wc && wc.minimize();
  document.getElementById('close').onclick = () => { save(); wc && wc.close(); };

  // custom combine/harvester glyph (distinct from the wheat seed)
  const HV_SVG = (s) => `<svg width="${s}" height="${s * 0.8}" viewBox="0 0 24 20" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="4" width="4" height="11" rx="1" fill="#edc561"/><rect x="5" y="3" width="14" height="10" rx="2" fill="#e07a2c"/><rect x="13" y="1" width="6" height="6" rx="1" fill="#c05e18"/><rect x="14.5" y="2.2" width="3.6" height="3.6" rx="1" fill="#cdeaf5"/><circle cx="9" cy="15" r="3.4" fill="#2b2b2b"/><circle cx="18" cy="15" r="2.3" fill="#2b2b2b"/></svg>`;
  document.getElementById('hvIcon').innerHTML = HV_SVG(15);

  // ---------- Config ----------
  const CELL = 16;
  const GRID_W = 240, GRID_H = 170;
  const WORLD = { w: GRID_W * CELL, h: GRID_H * CELL };
  const WORK = 0.28, VSPEED = 96, ROAD_MULT = 1.7, ROT_MULT = 1.8;
  const CROPS = {
    wheat:   { name: 'Wheat',   emoji: '🌾', cost: 1, sell: 3,  grow: 60,  color: '#e3c565' },
    carrot:  { name: 'Carrot',  emoji: '🥕', cost: 2, sell: 6,  grow: 180, color: '#e8863f' },
    pumpkin: { name: 'Pumpkin', emoji: '🎃', cost: 5, sell: 16, grow: 420, color: '#d9772e' },
  };
  const SEEDS = ['wheat', 'carrot', 'pumpkin'];
  // per-animal income ≈ value/every coins/sec (cow .13, sheep .11, chicken .09)
  const ANIMALS = {
    cow:     { emoji: '🐄', value: 4, every: 30, product: 'milk' },
    sheep:   { emoji: '🐑', value: 2, every: 18, product: 'wool' },
    chicken: { emoji: '🐔', value: 1, every: 11, product: 'eggs' },
  };
  const workerPrice    = (n) => Math.round(30 * Math.pow(1.55, n));
  const tractorPrice   = (n) => Math.round(60 * Math.pow(1.7, n));
  const harvesterPrice = (n) => Math.round(95 * Math.pow(1.7, n));

  const FARMS = [
    { cx: 22, cy: 86,   price: 0,    name: 'Home Farm' },
    { cx: 120, cy: 26,  price: 900,  name: 'North Farm' },
    { cx: 208, cy: 60,  price: 1400, name: 'East Farm' },
    { cx: 74, cy: 146,  price: 1700, name: 'South Farm' },
    { cx: 186, cy: 138, price: 2200, name: 'Lake Farm' },
    { cx: 158, cy: 96,  price: 2600, name: 'Hill Farm' },
    { cx: 96, cy: 120,  price: 3000, name: 'Valley Farm' },
  ];

  // ---------- World generation (deterministic) ----------
  let GEN = null;
  function generate() {
    if (GEN) return GEN;
    const GW = GRID_W, GH = GRID_H;
    let s = 776610322 >>> 0;
    const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
    const idx = (x, y) => y * GW + x;

    // seed points → regions
    const scols = 16, srows = 12, seeds = [];
    for (let r = 0; r < srows; r++) for (let c = 0; c < scols; c++)
      seeds.push({ x: (c + 0.5) * GW / scols + (rnd() - 0.5) * (GW / scols) * 0.85,
                   y: (r + 0.5) * GH / srows + (rnd() - 0.5) * (GH / srows) * 0.85 });
    const warp = (cx, cy) => [
      cx + 3.0 * Math.sin(cy * 0.21 + 1.1) + 1.7 * Math.sin(cy * 0.09 + 4.2),
      cy + 3.0 * Math.sin(cx * 0.19 + 2.4) + 1.7 * Math.sin(cx * 0.08 + 0.3),
    ];
    const region = new Int16Array(GW * GH);
    for (let cy = 0; cy < GH; cy++) for (let cx = 0; cx < GW; cx++) {
      const w = warp(cx, cy); let best = -1, bd = Infinity;
      for (let i = 0; i < seeds.length; i++) { const dx = seeds[i].x - w[0], dy = seeds[i].y - w[1], d = dx * dx + dy * dy; if (d < bd) { bd = d; best = i; } }
      region[idx(cx, cy)] = best;
    }
    // ~30% of regions are wild (grass/forest valleys, no farming)
    const wildRegion = (r) => (((r * 2654435761) >>> 0) % 10) < 3;

    // lakes
    const lakes = [];
    for (let k = 0; k < 7; k++) lakes.push({ x: rnd() * GW, y: rnd() * GH, r: 7 + rnd() * 12, p: rnd() * 6 });
    const isWater = (cx, cy) => {
      for (const L of lakes) {
        const rr = L.r * (1 + 0.28 * Math.sin(Math.atan2(cy - L.y, cx - L.x) * 3 + L.p));
        if ((cx - L.x) ** 2 + (cy - L.y) ** 2 < rr * rr) return true;
      }
      return false;
    };

    // classify cells: farm > water > (wild grass) > field-interior | grass-gap
    const kind = new Uint8Array(GW * GH); // 0 grass,1 field,2 water,3 road,4 hw,5 farm,6 wildgrass
    for (let cy = 0; cy < GH; cy++) for (let cx = 0; cx < GW; cx++) {
      let farm = false;
      for (const f of FARMS) if (Math.abs(cx - f.cx) <= 3 && Math.abs(cy - f.cy) <= 3) { farm = true; break; }
      if (farm) { kind[idx(cx, cy)] = 5; continue; }
      if (isWater(cx, cy)) { kind[idx(cx, cy)] = 2; continue; }
      if (cx < 1 || cy < 1 || cx >= GW - 1 || cy >= GH - 1) { kind[idx(cx, cy)] = 0; continue; }
      const r = region[idx(cx, cy)];
      if (wildRegion(r)) { kind[idx(cx, cy)] = 6; continue; }
      const border = region[idx(cx + 1, cy)] !== r || region[idx(cx, cy + 1)] !== r || region[idx(cx - 1, cy)] !== r || region[idx(cx, cy - 1)] !== r;
      kind[idx(cx, cy)] = border ? 0 : 1;
    }

    // organic road network: wavy highway + curved farm connectors
    const paint = (cx, cy, rad, k) => {
      const ix = Math.round(cx), iy = Math.round(cy);
      for (let dx = -rad; dx <= rad; dx++) for (let dy = -rad; dy <= rad; dy++) {
        if (Math.abs(dx) + Math.abs(dy) > rad) continue;       // diamond brush → 4-connected
        const x = ix + dx, y = iy + dy;
        if (x < 0 || y < 0 || x >= GW || y >= GH) continue;
        if (kind[idx(x, y)] === 5) continue;
        kind[idx(x, y)] = k;
      }
    };
    // curved road between two points (sine offset, tapering to 0 at the ends)
    const carveRoad = (x0, y0, x1, y1, k, ph) => {
      const len = Math.hypot(x1 - x0, y1 - y0) || 1, steps = Math.ceil(len * 1.2);
      const nx = -(y1 - y0) / len, ny = (x1 - x0) / len;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps, env = Math.sin(t * Math.PI);
        const off = (7 * Math.sin(t * 3.1 + ph) + 4 * Math.sin(t * 6.9 + ph * 1.7)) * env;
        paint(x0 + (x1 - x0) * t + nx * off, y0 + (y1 - y0) * t + ny * off, 1, k);
      }
    };
    // wavy diagonal highway
    for (let cy = 0; cy < GH; cy++) {
      const t = cy / GH, xc = GW * 0.72 + (GW * 0.28 - GW * 0.72) * t + 7 * Math.sin(cy * 0.11) + 3.5 * Math.sin(cy * 0.045 + 1.3);
      for (let cx = 0; cx < GW; cx++) { if (kind[idx(cx, cy)] === 5) continue; if (Math.abs(cx - xc) < 1.7) kind[idx(cx, cy)] = 4; }
    }
    // connect the farms with organic dirt roads
    const links = [[0, 1], [1, 2], [0, 3], [3, 4], [2, 4], [0, 5], [5, 6], [3, 6], [1, 5]];
    links.forEach(([a, b], i) => carveRoad(FARMS[a].cx, FARMS[a].cy, FARMS[b].cx, FARMS[b].cy, 3, i * 1.7 + 0.5));

    // field components (avoid grass/road/water/wild)
    const seen = new Uint8Array(GW * GH), comps = [];
    for (let cy = 0; cy < GH; cy++) for (let cx = 0; cx < GW; cx++) {
      if (kind[idx(cx, cy)] !== 1 || seen[idx(cx, cy)]) continue;
      const st = [[cx, cy]], cells = []; seen[idx(cx, cy)] = 1;
      while (st.length) {
        const [x, y] = st.pop(); cells.push([x, y]);
        for (const [nx, ny] of [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]])
          if (nx >= 0 && ny >= 0 && nx < GW && ny < GH && kind[idx(nx, ny)] === 1 && !seen[idx(nx, ny)]) { seen[idx(nx, ny)] = 1; st.push([nx, ny]); }
      }
      comps.push(cells);
    }
    comps.forEach(c => { if (c.length < 16) c.forEach(([x, y]) => kind[idx(x, y)] = 0); });
    const kept = comps.filter(c => c.length >= 16);
    kept.sort((a, b) => { const ca = centroidOf(a), cb = centroidOf(b); return (ca[1] - cb[1]) || (ca[0] - cb[0]); });
    const fieldTpl = kept.map((cells, i) => ({ name: String(i + 1), cells }));

    // collect draw lists
    const water = [], roads = [], hws = [], wild = [], roadSet = new Set();
    for (let cy = 0; cy < GH; cy++) for (let cx = 0; cx < GW; cx++) {
      const k = kind[idx(cx, cy)];
      if (k === 2) water.push([cx, cy]);
      else if (k === 3) { roads.push([cx, cy]); roadSet.add(cx + ',' + cy); }
      else if (k === 4) { hws.push([cx, cy]); roadSet.add(cx + ',' + cy); }
      else if (k === 6) wild.push([cx, cy]);
    }
    // trees: dense forests in wild valleys, sparse elsewhere on grass
    const trees = [];
    const isOpen = (cx, cy) => { const k = kind[idx(cx, cy)]; return k === 0 || k === 6; };
    for (let cy = 1; cy < GH - 1; cy++) for (let cx = 1; cx < GW - 1; cx++) {
      if (!isOpen(cx, cy)) continue;
      const wildHere = kind[idx(cx, cy)] === 6;
      const chance = wildHere ? 0.16 : 0.012;
      if (rnd() < chance) trees.push({ x: (cx + rnd()) * CELL, y: (cy + rnd()) * CELL, s: 0.8 + rnd() * 0.7, v: rnd() });
    }
    trees.sort((a, b) => a.y - b.y);
    GEN = { fieldTpl, water, roads, hws, wild, trees, roadSet, kind };
    return GEN;
  }
  function centroidOf(cells) { let sx = 0, sy = 0; for (const [x, y] of cells) { sx += x; sy += y; } return [sx / cells.length, sy / cells.length]; }

  // ---------- State ----------
  const SAVE_KEY = 'minifarmer.v9';
  let state, fields, vehicles, cellMap, critters;
  const cam = { x: 0, y: 0 };
  let zoom = 0.42;

  function fieldPrice(f) {
    const [cx, cy] = f.centroid;
    const d = Math.hypot(cx - FARMS[0].cx, cy - FARMS[0].cy), diag = Math.hypot(GRID_W, GRID_H);
    let p = f.cells.length * 1.7 * (0.6 + 1.9 * d / diag);
    if (f.type === 'pasture') p += f.herd * 90;
    return Math.max(20, Math.round(p / 5) * 5);
  }
  function buildFields(fromSave) {
    const tpl = fromSave || generate().fieldTpl;
    fields = tpl.map((f) => {
      const cells = f.cells.map(cc => {
        const cx = Array.isArray(cc) ? cc[0] : cc.cx, cy = Array.isArray(cc) ? cc[1] : cc.cy;
        return { cx, cy, fi: 0, crop: cc.crop || null, plantedAt: cc.plantedAt || 0, reserved: false };
      });
      return { name: f.name, plannedCrop: f.plannedCrop || 'wheat', owned: !!f.owned, lastPay: f.lastPay || 0, cells };
    });
    cellMap = new Map();
    fields.forEach((f, fi) => {
      f.minx = Infinity; f.miny = Infinity; f.maxx = -Infinity; f.maxy = -Infinity;
      let sx = 0, sy = 0; const inField = new Set();
      f.cells.forEach(c => {
        c.fi = fi; cellMap.set(c.cx + ',' + c.cy, c); inField.add(c.cx + ',' + c.cy);
        f.minx = Math.min(f.minx, c.cx); f.miny = Math.min(f.miny, c.cy); f.maxx = Math.max(f.maxx, c.cx); f.maxy = Math.max(f.maxy, c.cy);
        sx += c.cx; sy += c.cy;
      });
      f.centroid = [sx / f.cells.length, sy / f.cells.length];
      const h = (fi * 2654435761) >>> 0;
      f.type = (h % 5 === 2 && f.cells.length >= 20 && f.cells.length <= 140) ? 'pasture' : 'crop';
      if (f.type === 'pasture') { f.animal = ['cow', 'sheep', 'chicken'][h % 3]; f.herd = Math.max(2, Math.min(10, Math.round(f.cells.length / 12))); }
      f.price = fieldPrice(f);
      f.edges = [];
      f.cells.forEach(c => {
        if (!inField.has(c.cx + ',' + (c.cy - 1))) f.edges.push([c.cx, c.cy, c.cx + 1, c.cy]);
        if (!inField.has(c.cx + ',' + (c.cy + 1))) f.edges.push([c.cx, c.cy + 1, c.cx + 1, c.cy + 1]);
        if (!inField.has((c.cx - 1) + ',' + c.cy)) f.edges.push([c.cx, c.cy, c.cx, c.cy + 1]);
        if (!inField.has((c.cx + 1) + ',' + c.cy)) f.edges.push([c.cx + 1, c.cy, c.cx + 1, c.cy + 1]);
      });
    });
    critters = [];
    fields.forEach((f, fi) => {
      if (f.type !== 'pasture') return;
      for (let i = 0; i < f.herd; i++) { const c = f.cells[(i * 13) % f.cells.length]; critters.push({ fi, x: c.cx * CELL + CELL / 2, y: c.cy * CELL + CELL / 2, tx: 0, ty: 0, wait: Math.random() * 3, moving: false }); }
    });
  }
  function farmPark(fi, slot) { const f = FARMS[fi]; return { x: f.cx * CELL + 2 + (slot % 3) * 20, y: f.cy * CELL + 34 + Math.floor(slot / 3) * 18 }; }
  function load() {
    generate();
    try {
      const s = JSON.parse(localStorage.getItem(SAVE_KEY));
      if (s && Array.isArray(s.fields)) {
        state = { coins: s.coins, seed: s.seed || 'wheat', workers: s.workers || 2, farmsOwned: s.farmsOwned || [true], activeFarm: s.activeFarm || 0, silo: s.silo || { wheat: 0, carrot: 0, pumpkin: 0 }, siloCap: s.siloCap || 200, siloUp: s.siloUp || 0, autoSell: !!s.autoSell, stats: s.stats || { earned: 0, spent: 0, harvested: 0, sold: 0, planted: 0, rotted: 0 } };
        while (state.farmsOwned.length < FARMS.length) state.farmsOwned.push(false);
        buildFields(s.fields);
        vehicles = (s.vehicles || []).map(v => ({ type: v.type, farm: v.farm || 0, x: v.x, y: v.y, tx: v.x, ty: v.y, state: 'parked', crewed: false, cell: null, timer: 0, angle: 0 }));
        if (!vehicles.length) vehicles = defaultVehicles();
        if (s.cam) { cam.x = s.cam.x; cam.y = s.cam.y; zoom = s.cam.z || 0.42; }
        const capped = Date.now() - 4 * 3600 * 1000;
        fields.forEach(f => { if (f.type === 'pasture' && f.owned) f.lastPay = Math.max(f.lastPay || Date.now(), capped); });
        return;
      }
    } catch (_) {}
    state = { coins: 400, seed: 'wheat', workers: 2, farmsOwned: FARMS.map((_, i) => i === 0), activeFarm: 0, silo: { wheat: 0, carrot: 0, pumpkin: 0 }, siloCap: 200, siloUp: 0, autoSell: false, stats: { earned: 0, spent: 0, harvested: 0, sold: 0, planted: 0, rotted: 0 } };
    buildFields(null);
    // free starter: smallest crop field close to home
    let best = -1, bs = Infinity;
    fields.forEach((f, i) => {
      if (f.type !== 'crop') return;
      const d = Math.hypot(f.centroid[0] - FARMS[0].cx, f.centroid[1] - FARMS[0].cy);
      if (d < 30) { const score = f.cells.length + d; if (score < bs) { bs = score; best = i; } }
    });
    if (best >= 0) fields[best].owned = true;
    vehicles = defaultVehicles();
    cam.x = FARMS[0].cx * CELL - 200; cam.y = FARMS[0].cy * CELL - 240;
  }

  function toggleStats(v) { statsOpen = v === undefined ? !statsOpen : v; statsPanel.style.display = statsOpen ? 'flex' : 'none'; if (statsOpen) renderStats(); }
  function renderStats() {
    const s = state.stats, net = Math.round(s.earned - s.spent);
    const cropF = fields.filter(f => f.owned && f.type === 'crop').length, pastF = fields.filter(f => f.owned && f.type === 'pasture').length;
    const row = (label, val) => `<div class="st-row"><span>${label}</span><span class="st-val">${val}</span></div>`;
    statsPanel.innerHTML = `<div class="mkt-head">📈 Statistics <span class="mkt-close">✕</span></div>`
      + row('💰 Total earned', '🪙' + Math.round(s.earned))
      + row('💸 Total spent', '🪙' + Math.round(s.spent))
      + row('📊 Net profit', (net >= 0 ? '+' : '') + '🪙' + net)
      + row('🪙 Coins on hand', '🪙' + Math.floor(state.coins))
      + `<div class="st-div"></div>`
      + row('🌾 Crops harvested', s.harvested)
      + row('🛒 Crops sold', s.sold)
      + row('🌱 Cells planted', s.planted)
      + row('🥀 Crops spoiled', s.rotted)
      + `<div class="st-div"></div>`
      + row('🚜 Fields owned', cropF)
      + row('🐄 Pastures owned', pastF)
      + row('🏠 Farms owned', state.farmsOwned.filter(Boolean).length + ' / ' + FARMS.length);
    statsPanel.querySelector('.mkt-close').onclick = () => toggleStats(false);
  }

  // ---------- Input ----------
  let down = false, moved = false, sx = 0, sy = 0, cx0 = 0, cy0 = 0, hoverField = -1, hoverFarm = -1, mouseX = 0, mouseY = 0, mouseIn = false;
  const keys = {};
  window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (['arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault(); keys[k] = true; });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  const toWorld = (mx, my) => ({ x: cam.x + mx / zoom, y: cam.y + my / zoom });
  canvas.addEventListener('mousedown', e => { down = true; moved = false; sx = e.clientX; sy = e.clientY; cx0 = cam.x; cy0 = cam.y; });
  window.addEventListener('mouseup', e => { if (down && !moved) handleClick(e); down = false; });
  canvas.addEventListener('mousemove', e => {
    const b = canvas.getBoundingClientRect(), mx = e.clientX - b.left, my = e.clientY - b.top;
    mouseX = mx; mouseY = my; mouseIn = true;
    if (down) { const ddx = e.clientX - sx, ddy = e.clientY - sy; if (Math.abs(ddx) + Math.abs(ddy) > 4) moved = true; cam.x = cx0 - ddx / zoom; cam.y = cy0 - ddy / zoom; clampCam(); }
    const w = toWorld(mx, my); hoverFarm = farmAt(w.x, w.y); hoverField = hoverFarm >= 0 ? -1 : fieldAt(w.x, w.y);
  });
  canvas.addEventListener('mouseleave', () => { hoverField = -1; hoverFarm = -1; mouseIn = false; });
  canvas.addEventListener('wheel', e => { e.preventDefault(); const b = canvas.getBoundingClientRect(), mx = e.clientX - b.left, my = e.clientY - b.top, w = toWorld(mx, my); zoom = Math.min(MAXZ, Math.max(MINZ, zoom * (e.deltaY > 0 ? 0.86 : 1.16))); cam.x = w.x - mx / zoom; cam.y = w.y - my / zoom; clampCam(); }, { passive: false });
  function fieldAt(wx, wy) { const c = cellMap.get(Math.floor(wx / CELL) + ',' + Math.floor(wy / CELL)); return c ? c.fi : -1; }
  function farmAt(wx, wy) { for (let i = 0; i < FARMS.length; i++) { const f = FARMS[i], x = f.cx * CELL, y = f.cy * CELL; if (wx >= x - 12 && wx <= x + 58 && wy >= y - 22 && wy <= y + 34) return i; } return -1; }
  function handleClick(e) {
    const b = canvas.getBoundingClientRect(), w = toWorld(e.clientX - b.left, e.clientY - b.top), fa = farmAt(w.x, w.y);
    if (fa >= 0) {
      if (state.farmsOwned[fa]) { state.activeFarm = fa; flash(`${FARMS[fa].name} is now your active farm`); renderDock(); save(); }
      else if (state.coins >= FARMS[fa].price) { state.coins -= FARMS[fa].price; state.stats.spent += FARMS[fa].price; state.farmsOwned[fa] = true; state.activeFarm = fa; flash(`🏠 ${FARMS[fa].name} purchased! Machines are bought here now`); renderHud(); renderDock(); save(); }
      else flash(`${FARMS[fa].name} costs 🪙${FARMS[fa].price}`);
      return;
    }
    const fi = fieldAt(w.x, w.y); if (fi < 0) return; const f = fields[fi];
    if (!f.owned) {
      if (state.coins >= f.price) { state.coins -= f.price; state.stats.spent += f.price; f.owned = true; if (f.type === 'pasture') { f.lastPay = Date.now(); flash(`Pasture ${f.name}: ${f.herd} ${ANIMALS[f.animal].emoji} now earn for you`); } else flash(`Field ${f.name} purchased (${f.cells.length} cells)`); renderHud(); save(); }
      else flash(`${f.type === 'pasture' ? 'Pasture' : 'Field'} ${f.name} costs 🪙${f.price}`);
    } else if (f.type === 'crop') { f.plannedCrop = state.seed; flash(`Field ${f.name} → plant ${CROPS[state.seed].emoji}`); save(); }
    else { const d = ANIMALS[f.animal]; flash(`Pasture ${f.name}: ${f.herd} ${d.emoji} · +🪙${f.herd * d.value}/${d.every}s`); }
  }
  let hintT = 0;
  function flash(msg) { el('hint').textContent = msg; hintT = 2.4; }
  function hoverText() {
    if (hoverFarm >= 0) { const f = FARMS[hoverFarm]; if (state.farmsOwned[hoverFarm]) return `${f.name}${state.activeFarm === hoverFarm ? ' · active' : ' · click to set active'}`; return `${f.name} · 🪙${f.price} — click to buy`; }
    if (hoverField < 0) return 'Drag to pan · wheel to zoom';
    const f = fields[hoverField];
    if (f.type === 'pasture') { const d = ANIMALS[f.animal]; if (!f.owned) return `Pasture ${f.name} · ${f.herd} ${d.emoji} · 🪙${f.price} — buy`; return `Pasture ${f.name} · ${f.herd} ${d.emoji} · +🪙${f.herd * d.value}/${d.every}s`; }
    if (!f.owned) return `Field ${f.name} · ${f.cells.length} cells · 🪙${f.price} — click to buy`;
    let rip = 0; for (const c of f.cells) if (ripe(c)) rip++;
    return `Field ${f.name} · ${f.cells.length} cells · plan ${CROPS[f.plannedCrop].emoji} · ${rip} ripe`;
  }
  function tooltipText() {
    if (hoverFarm >= 0) { const f = FARMS[hoverFarm]; return state.farmsOwned[hoverFarm] ? f.name + (state.activeFarm === hoverFarm ? ' · active' : '') : `${f.name} · 🪙${f.price}`; }
    if (hoverField < 0) return null;
    const f = fields[hoverField];
    if (f.type === 'pasture') { const d = ANIMALS[f.animal]; return f.owned ? `Pasture ${f.name} · +🪙${f.herd * d.value}/${d.every}s` : `Pasture ${f.name} · ${f.herd}${d.emoji} · 🪙${f.price}`; }
    if (!f.owned) return `Field ${f.name} · ${f.cells.length} cells · 🪙${f.price}`;
    return `Field ${f.name} · plant ${CROPS[f.plannedCrop].emoji}`;
  }

  // ---------- Drawing helpers ----------
  function rr(c2, x, y, w, h, r) { c2.beginPath(); c2.moveTo(x + r, y); c2.arcTo(x + w, y, x + w, y + h, r); c2.arcTo(x + w, y + h, x, y + h, r); c2.arcTo(x, y + h, x, y, r); c2.arcTo(x, y, x + w, y, r); c2.closePath(); }
  function hex(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
  function mix(a, b, t) { const A = hex(a), B = hex(b); return `rgb(${A.map((v, i) => Math.round(v + (B[i] - v) * t)).join(',')})`; }
  function drawVehicle(v) {
    ctx.save(); ctx.translate(v.x, v.y);
    ctx.fillStyle = 'rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(0, 4, 11, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.rotate(v.angle);
    ctx.fillStyle = '#262626'; rr(ctx, -8, -8, 6, 5, 2); ctx.fill(); rr(ctx, -8, 3, 6, 5, 2); ctx.fill(); rr(ctx, 5, -6, 4, 4, 2); ctx.fill(); rr(ctx, 5, 2, 4, 4, 2); ctx.fill();
    ctx.fillStyle = v.type === 'tractor' ? '#3aa655' : '#e07a2c'; rr(ctx, -8, -6, 15, 12, 3); ctx.fill();
    if (v.type === 'harvester') { ctx.fillStyle = '#edc561'; rr(ctx, 7, -8, 4, 16, 2); ctx.fill(); }
    ctx.fillStyle = v.type === 'tractor' ? '#2f8a47' : '#c05e18'; rr(ctx, -4, -4, 7, 8, 2); ctx.fill();
    if (v.crewed) { ctx.fillStyle = '#f4d1a6'; ctx.beginPath(); ctx.arc(-1, 0, 2.1, 0, Math.PI * 2); ctx.fill(); }
    ctx.restore();
  }
  function drawFarm(i) {
    const f = FARMS[i], x = f.cx * CELL, y = f.cy * CELL, owned = state.farmsOwned[i];
    ctx.globalAlpha = owned ? 1 : 0.64;
    ctx.fillStyle = '#b0553f'; rr(ctx, x - 4, y - 2, 44, 28, 5); ctx.fill();
    ctx.fillStyle = '#8a3f2e'; ctx.beginPath(); ctx.moveTo(x - 8, y); ctx.lineTo(x + 18, y - 15); ctx.lineTo(x + 44, y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '12px "Segoe UI"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(owned ? '🏠' : '🔒', x + 18, y + 12);
    ctx.globalAlpha = 1;
    if (owned && state.activeFarm === i) { rr(ctx, x - 10, y - 19, 56, 50, 8); ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 2 / zoom; ctx.stroke(); }
    const fs = 12; ctx.font = `bold ${fs}px "Segoe UI"`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillText(owned ? f.name : `🪙${f.price}`, x + 18.6, y + 40.6);
    ctx.fillStyle = '#fff'; ctx.fillText(owned ? f.name : `🪙${f.price}`, x + 18, y + 40);
  }
  function drawOwnedField(f, t) {
    for (const c of f.cells) {
      const x = c.cx * CELL, y = c.cy * CELL;
      let col;
      if (f.type === 'pasture') col = ((c.cx + c.cy) & 1) ? '#8ccb63' : '#84c45c';
      else if (!c.crop) col = '#7a5236';
      else if (ripe(c)) { const gr = CROPS[c.crop].grow * 1000, over = (Date.now() - c.plantedAt - gr) / (gr * (ROT_MULT - 1)); col = over > 0.05 ? mix(CROPS[c.crop].color, '#5f4f2c', Math.min(1, over) * 0.8) : CROPS[c.crop].color; }
      else col = mix('#6b8f3f', CROPS[c.crop].color, growth(c) * 0.85);
      ctx.fillStyle = col; ctx.fillRect(x, y, CELL, CELL);
      if (f.type === 'crop' && ripe(c)) { ctx.fillStyle = 'rgba(255,255,255,.22)'; ctx.fillRect(x + 3, y + 3, CELL - 8, CELL - 8); }
      if (c.reserved) { ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 1.3; ctx.strokeRect(x + 1.3, y + 1.3, CELL - 2.6, CELL - 2.6); }
    }
    ctx.beginPath();
    for (const [x1, y1, x2, y2] of f.edges) { ctx.moveTo(x1 * CELL, y1 * CELL); ctx.lineTo(x2 * CELL, y2 * CELL); }
    ctx.strokeStyle = f.type === 'pasture' ? '#7a4e2c' : 'rgba(60,42,24,.7)'; ctx.lineWidth = f.type === 'pasture' ? 2 : 1.4; ctx.stroke();
    drawChip(ctx, f, true);
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    const pan = 320 * dt / zoom;
    if (keys['a'] || keys['arrowleft']) cam.x -= pan;
    if (keys['d'] || keys['arrowright']) cam.x += pan;
    if (keys['w'] || keys['arrowup']) cam.y -= pan;
    if (keys['s'] || keys['arrowdown']) cam.y += pan;
    clampCam();
    if (hintT > 0) { hintT -= dt; if (hintT <= 0) el('hint').textContent = hoverText(); } else el('hint').textContent = hoverText();
    updateVehicles(dt); updatePastures(); updateCritters(dt); updateMarket(dt);

    // blit cached base (screen space), letterboxing when the view exceeds the world
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#6fb04a'; ctx.fillRect(0, 0, W, H);
    const sw = W / zoom, sh = H / zoom;
    let sx = cam.x, sy = cam.y, sdw = sw, sdh = sh, dx = 0, dy = 0;
    if (sx < 0) { dx = -sx * zoom; sdw += sx; sx = 0; }
    if (sy < 0) { dy = -sy * zoom; sdh += sy; sy = 0; }
    if (sx + sdw > WORLD.w) sdw = WORLD.w - sx;
    if (sy + sdh > WORLD.h) sdh = WORLD.h - sy;
    ctx.imageSmoothingEnabled = false;
    if (sdw > 0 && sdh > 0) ctx.drawImage(base, sx, sy, sdw, sdh, dx, dy, sdw * zoom, sdh * zoom);
    ctx.imageSmoothingEnabled = true;

    // dynamic layer (world transform)
    ctx.setTransform(dpr * zoom, 0, 0, dpr * zoom, -cam.x * dpr * zoom, -cam.y * dpr * zoom);
    const vx0 = cam.x, vy0 = cam.y, vx1 = cam.x + sw, vy1 = cam.y + sh, t = now / 1000;

    for (const f of fields) {
      if (!f.owned) continue;
      if (f.maxx * CELL < vx0 || f.minx * CELL > vx1 || f.maxy * CELL < vy0 || f.miny * CELL > vy1) continue;
      drawOwnedField(f, t);
    }
    // hover outline
    if (hoverField >= 0) { const f = fields[hoverField]; ctx.beginPath(); for (const [x1, y1, x2, y2] of f.edges) { ctx.moveTo(x1 * CELL, y1 * CELL); ctx.lineTo(x2 * CELL, y2 * CELL); } ctx.strokeStyle = 'rgba(255,255,255,.95)'; ctx.lineWidth = 2.2 / zoom; ctx.stroke(); }

    // critters
    ctx.font = '11px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const a of critters) { if (a.x < vx0 - 20 || a.y < vy0 - 20 || a.x > vx1 + 20 || a.y > vy1 + 20) continue; const bob = a.moving ? Math.sin(t * 9 + a.x) * 1.1 : 0; ctx.fillText(ANIMALS[fields[a.fi].animal].emoji, a.x, a.y + bob); }

    for (let i = 0; i < FARMS.length; i++) { const f = FARMS[i]; if (f.cx * CELL > vx0 - 60 && f.cx * CELL < vx1 + 20 && f.cy * CELL > vy0 - 40 && f.cy * CELL < vy1 + 40) drawFarm(i); }
    for (const v of vehicles) if (v.x > vx0 - 30 && v.y > vy0 - 30 && v.x < vx1 + 30 && v.y < vy1 + 30) drawVehicle(v);

    for (let k = pops.length - 1; k >= 0; k--) { const p = pops[k]; p.life -= dt * 0.9; p.y -= dt * 20; if (p.life <= 0) { pops.splice(k, 1); continue; } ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = '#12481a'; ctx.font = `bold ${13 / Math.max(zoom, 0.55)}px "Segoe UI"`; ctx.textAlign = 'center'; ctx.fillText(p.text, p.x, p.y); ctx.globalAlpha = 1; }

    // cursor tooltip (screen space)
    if (mouseIn && !down) {
      const tt = tooltipText();
      if (tt) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.font = 'bold 12px "Segoe UI"';
        const tw = ctx.measureText(tt).width + 16, th = 23;
        let tx = mouseX + 15, ty = mouseY + 16;
        if (tx + tw > W) tx = mouseX - 15 - tw;
        if (ty + th > H) ty = mouseY - 10 - th;
        if (tx < 2) tx = 2;
        rr(ctx, tx, ty, tw, th, 7); ctx.fillStyle = 'rgba(24,32,22,.92)'; ctx.fill();
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText(tt, tx + 8, ty + th / 2 + 0.5);
      }
    }

    requestAnimationFrame(frame);
  }

  // ---------- Boot ----------
  buildBase(); resize(); renderHud(); renderDock();
  requestAnimationFrame((t) => { last = t; frame(t); });
})();
</script>
</body>
</html>
